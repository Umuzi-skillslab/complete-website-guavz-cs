<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Zetu Kuluvuyo Zide</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <h1>Zetu Kuluvuyo Zide</h1>
        <nav>
            <ul>
                <li><a href="index.html" class="nav-links">Home</a></li>
                <li><a href="about.html" class="nav-links">About</a></li>
                <li><a href="projects.html" class="nav-links">Projects</a></li>
                <li><a href="contact.html" class="nav-links active">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section class="hero-pg">
            <h1>Contact Me</h1>
            <p>Have a project in mind or want to collaborate? Let's connect!</p>
        </section>

        <section class="contact">
            <form action="#" method="post">
                <label for="name">Full Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="Jane Doe" required minlength="2" maxlength="50">

                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="jane.doe@gmail.com" required>

                <label for="phone">Phone Number <span class="form-hint">(optional)</span></label>
                <input type="tel" id="phone" name="phone" placeholder="+27 76 379 0913" pattern="[+]?[0-9\s\-]{7,15}">

                <label for="enquiry">How can I help you? <span class="required">*</span></label>
                <select id="enquiry" name="enquiry" required>
                    <option value="" disabled selected>Select an option</option>
                    <option value="freelance">Freelance Project</option>
                    <option value="collaboration">Collaboration</option>
                    <option value="job">Job Opportunity</option>
                    <option value="feedback">Feedback</option>
                    <option value="other">Other</option>
                </select>

                <fieldset>
                    <legend>Preferred Contact Method <span class="required">*</span></legend>
                    <label class="radio-label">
                        <input type="radio" name="contact" value="email" required checked>
                        Email
                    </label>

                    <label class="radio-label">
                        <input type="radio" name="contact" value="phone" required>
                        Phone
                    </label>

                    <label class="radio-label">
                        <input type="radio" name="contact" value="both" required>
                        Both
                    </label>
                </fieldset>

                <label class="checkbox-label">
                    <input type="checkbox" id="blog" name="blog" value="yes">
                    Subscribe to my blog for updates on my latest projects and insights into web development.
                </label>

                <label for="message">Your Message <span class="required">*</span></label>
                <textarea id="message" name="message" placeholder="Tell me about your project or what you have in mind..." required minlength="20" rows="6"></textarea>

                <button type="submit" class="btn form-btn">Send Message</button>
            </form>
        </section>
    </main>
    
    <footer class="footer">
        <p>Contact me at <a href="mailto:zetu.zide@umuzi.org">zetu.zide@umuzi.org</a></p>
        <p>&copy; 2026 Zetu Kuluvuyo Zide. All rights reserved.</p>
    </footer>
</body>
</html>
